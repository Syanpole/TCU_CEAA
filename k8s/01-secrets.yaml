apiVersion: v1
kind: Secret
metadata:
  name: tcu-ceaa-secrets
  namespace: tcu-ceaa
type: Opaque
stringData:
  # Database
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://postgres:CHANGE_ME_IN_PRODUCTION@postgres-service:5432/tcu_ceaa"
  
  # Django
  SECRET_KEY: "CHANGE_ME_GENERATE_NEW_SECRET_KEY"
  
  # AWS Credentials (for S3 and Textract)
  AWS_ACCESS_KEY_ID: "YOUR_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "YOUR_AWS_SECRET_KEY"
  AWS_STORAGE_BUCKET_NAME: "tcu-ceaa-media"
  AWS_S3_REGION_NAME: "us-east-1"
  
  # Redis
  REDIS_URL: "redis://redis-service:6379/0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tcu-ceaa-config
  namespace: tcu-ceaa
data:
  ALLOWED_HOSTS: "api.tcu-ceaa.com,backend-service"
  DEBUG: "False"
  ENVIRONMENT: "production"
  POSTGRES_DB: "tcu_ceaa"
  POSTGRES_USER: "postgres"
