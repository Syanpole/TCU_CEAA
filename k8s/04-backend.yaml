apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: tcu-ceaa
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tcu-ceaa
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      # Run migrations before starting the app
      - name: migrate
        image: YOUR_REGISTRY/tcu-ceaa-backend:latest
        command: ["python", "manage.py", "migrate"]
        envFrom:
        - configMapRef:
            name: tcu-ceaa-config
        - secretRef:
            name: tcu-ceaa-secrets
      containers:
      - name: backend
        image: YOUR_REGISTRY/tcu-ceaa-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: tcu-ceaa-config
        - secretRef:
            name: tcu-ceaa-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: tcu-ceaa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
