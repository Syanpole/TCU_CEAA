apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tcu-ceaa-ingress
  namespace: tcu-ceaa-staging
  annotations:
    # For AWS ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'  # HTTP only for staging
spec:
  rules:
  - host: staging.tcu-ceaa.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: staging-api.tcu-ceaa.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
