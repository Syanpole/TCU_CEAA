apiVersion: v1
kind: Secret
metadata:
  name: tcu-ceaa-secrets
  namespace: tcu-ceaa-staging
type: Opaque
stringData:
  # Database - STAGING
  POSTGRES_PASSWORD: "staging_password_change_me"
  DATABASE_URL: "postgresql://postgres:staging_password_change_me@postgres-service:5432/tcu_ceaa_staging"
  
  # Django - Generate new key for staging
  SECRET_KEY: "django-insecure-staging-CHANGE-THIS-IN-PRODUCTION"
  
  # AWS Credentials (use same as production or separate staging account)
  AWS_ACCESS_KEY_ID: "YOUR_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "YOUR_AWS_SECRET_KEY"
  AWS_STORAGE_BUCKET_NAME: "tcu-ceaa-staging-media"
  AWS_S3_REGION_NAME: "us-east-1"
  
  # Redis
  REDIS_URL: "redis://redis-service:6379/0"
  
  # Email (Gmail)
  EMAIL_HOST_USER: "your-email@gmail.com"
  EMAIL_HOST_PASSWORD: "your-app-password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tcu-ceaa-config
  namespace: tcu-ceaa-staging
data:
  ALLOWED_HOSTS: "staging.tcu-ceaa.com,staging-api.tcu-ceaa.com,backend-service"
  DEBUG: "False"
  ENVIRONMENT: "staging"
  POSTGRES_DB: "tcu_ceaa_staging"
  POSTGRES_USER: "postgres"
  FRONTEND_URL: "https://staging.tcu-ceaa.com"
  
  # Feature Flags for Staging
  FEATURE_AUTO_VERIFY_COE: "True"
  FEATURE_AUTO_VERIFY_ID: "True"
  FEATURE_AUTO_VERIFY_BIRTH_CERT: "False"
  FEATURE_AUTO_VERIFY_VOTERS: "False"
  FEATURE_LIVENESS_CHECK: "False"
