apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: tcu-ceaa-staging
spec:
  replicas: 1  # Reduced for staging
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: YOUR_REGISTRY/tcu-ceaa-celery:staging
        envFrom:
        - configMapRef:
            name: tcu-ceaa-config
        - secretRef:
            name: tcu-ceaa-secrets
        resources:
          requests:
            memory: "1.5Gi"  # Celery image is 4.46GB with ML models, needs more RAM
            cpu: "1000m"
          limits:
            memory: "3Gi"   # Allow headroom for ML processing
            cpu: "2000m"
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - backend_project
            - inspect
            - ping
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 30
