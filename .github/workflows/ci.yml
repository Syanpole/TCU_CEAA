name: TCU CEAA CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django migrations
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Run Django tests
        run: |
          cd backend
          python manage.py test

      - name: Check Django code style with flake8
        run: |
          cd backend
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Check TypeScript compilation
        run: |
          cd frontend
          npm run build

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci

      - name: Lint frontend code
        run: |
          cd frontend
          npm run lint || echo "Linting completed with warnings"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit for backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --progress-spinner=off --desc --strict || true

      - name: Run security audit for frontend
        run: |
          cd frontend
          npm audit --audit-level moderate || true

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend for production
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Collect Django static files
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: backend_project.settings

      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cp -r backend deployment/
          cp -r frontend/build deployment/frontend-build
          tar -czf tcu-ceaa-deployment.tar.gz deployment/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcu-ceaa-deployment
          path: tcu-ceaa-deployment.tar.gz
          retention-days: 30

      # Optional: Deploy to staging/production
      # - name: Deploy to staging
      #   if: github.ref == 'refs/heads/develop'
      #   run: echo "Deploy to staging server"
      
      # - name: Deploy to production
      #   if: github.ref == 'refs/heads/main'
      #   run: echo "Deploy to production server"
