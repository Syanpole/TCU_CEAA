name: TCU CEAA CI/CD Pipeline

on:
  push:
    branches: [ main, develop, AI_Integration ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Ensure setuptools and wheel are installed
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (OpenBLAS and PyMuPDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenblas-dev \
            liblapack-dev \
            gfortran \
            libmupdf-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libopenjp2-7-dev \
            libjbig2dec0-dev \
            pkg-config

      - name: Install backend dependencies (CI-safe installation)
        run: |
          cd backend
          echo "Installing CI dependencies with wheel-only policy..."
          
          # Upgrade pip and install build tools
          python -m pip install --upgrade pip setuptools wheel
          
          # Install dependencies with strict wheel-only policy to avoid compilation
          pip install --only-binary=all --no-cache-dir -r requirements-ci.txt
          
          echo "Installation completed successfully"
          
      - name: Verify AI dependencies compatibility
        run: |
          cd backend
          echo "🧪 Running comprehensive dependency tests..."
          python test_ci_dependency_resolution.py
          
          echo "🔍 Checking individual components..."
          python -c "import sys; print(f'Python version: {sys.version}')"
          python -c "
          import json
          try:
              # Test essential packages
              import django, numpy, PIL
              print('✅ Core packages: Django, NumPy, Pillow')
              
              # Test PDF processors
              pdf_processors = []
              try:
                  import PyPDF2; pdf_processors.append('PyPDF2')
              except: pass
              try:
                  import pdfplumber; pdf_processors.append('pdfplumber')  
              except: pass
              print(f'✅ PDF processors: {pdf_processors}')
              
              # Test AI packages (optional)
              ai_packages = []
              try:
                  import cv2; ai_packages.append('OpenCV')
              except: pass
              try:
                  import sklearn; ai_packages.append('scikit-learn')
              except: pass
              try:
                  import nltk; ai_packages.append('NLTK')
              except: pass
              print(f'✅ AI packages: {ai_packages}')
              
              # Save test results
              results = {
                  'core_packages': ['Django', 'NumPy', 'Pillow'],
                  'pdf_processors': pdf_processors,
                  'ai_packages': ai_packages,
                  'ci_safe': True
              }
              with open('ci_test_results.json', 'w') as f:
                  json.dump(results, f, indent=2)
              print('✅ All critical dependencies working')
              
          except ImportError as e:
              print(f'❌ Critical dependency missing: {e}')
              exit(1)
          "

      - name: Run Django migrations
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Run Django tests
        run: |
          cd backend
          python manage.py test

      - name: Check Django code style with flake8
        run: |
          cd backend
          python -m pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Check TypeScript compilation
        run: |
          cd frontend
          GENERATE_SOURCEMAP=false npm run build
        env:
          CI: false

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci

      - name: Lint frontend code
        run: |
          cd frontend
          npm run lint || echo "Linting completed with warnings"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Ensure setuptools and wheel are installed
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Run security audit for backend
        run: |
          cd backend
          python -m pip install pip-audit
          pip install -r requirements.txt
          pip-audit --progress-spinner=off --desc --strict || true

      - name: Run security audit for frontend
        run: |
          cd frontend
          npm audit --audit-level moderate || true

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Ensure setuptools and wheel are installed
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend for production
        run: |
          cd frontend
          npm install
          GENERATE_SOURCEMAP=false npm run build
        env:
          CI: false

      - name: Collect Django static files
        run: |
          cd backend
          pip install -r requirements.txt
          python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: backend_project.settings

      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cp -r backend deployment/
          cp -r frontend/build deployment/frontend-build
          tar -czf tcu-ceaa-deployment.tar.gz deployment/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcu-ceaa-deployment
          path: tcu-ceaa-deployment.tar.gz
          retention-days: 30

      # Optional: Deploy to staging/production
      # - name: Deploy to staging
      #   if: github.ref == 'refs/heads/develop'
      #   run: echo "Deploy to staging server"
      
      # - name: Deploy to production
      #   if: github.ref == 'refs/heads/main'
      #   run: echo "Deploy to production server"
