# GitHub Actions Workflow for Django CI/CD
name: Django CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopenblas-dev \
          liblapack-dev \
          libblas-dev \
          gfortran \
          build-essential \
          pkg-config \
          cmake \
          python3-dev \
          libffi-dev \
          libssl-dev \
          tesseract-ocr \
          tesseract-ocr-eng
    
    - name: Set environment variables for OpenBLAS
      run: |
        echo "PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/usr/lib:/usr/local/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
    
    - name: Upgrade pip and install build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel
    
    - name: Install core dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements-ci.txt --prefer-binary
    
    - name: Install ML dependencies (with error handling)
      working-directory: ./backend
      run: |
        pip install -r requirements-ml.txt --prefer-binary || echo "Some ML packages failed, continuing..."
    
    - name: Verify installation
      working-directory: ./backend
      run: |
        python -c "import django; print(f'Django version: {django.get_version()}')"
        python -c "import numpy; print(f'NumPy version: {numpy.__version__}')"
        python -c "import cv2; print(f'OpenCV version: {cv2.__version__}')"
        python -c "import scipy; print(f'SciPy version: {scipy.__version__}')" || echo "SciPy not available"
    
    - name: Run Django migrations
      working-directory: ./backend
      run: |
        python manage.py migrate
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
    
    - name: Run Django tests
      working-directory: ./backend
      run: |
        python manage.py test
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/tcu-ceaa-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/tcu-ceaa-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max