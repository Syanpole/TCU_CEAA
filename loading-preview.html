<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Loading Spinner Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        /* Modern Loading Spinner */
        .modern-loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .modern-loading-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: transparent;
            z-index: 9999;
        }

        .modern-loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        /* Modern Spinner */
        .modern-spinner {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
            box-sizing: border-box;
        }

        .ring-1 {
            width: 120px;
            height: 120px;
            border-top-color: #fbbf24;
            border-right-color: #fbbf24;
            animation: spin-ring-1 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .ring-2 {
            width: 90px;
            height: 90px;
            border-top-color: #60a5fa;
            border-right-color: #60a5fa;
            border-bottom-color: #60a5fa;
            animation: spin-ring-2 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            animation-delay: 0.1s;
        }

        .ring-3 {
            width: 60px;
            height: 60px;
            border-top-color: #ef4444;
            border-right-color: #ef4444;
            border-bottom-color: #ef4444;
            border-left-color: #ef4444;
            animation: spin-ring-3 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            animation-delay: 0.2s;
        }

        .spinner-center {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: pulse-center 1.5s ease-in-out infinite;
        }

        /* Spinner Animations */
        @keyframes spin-ring-1 {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }
            50% {
                transform: rotate(180deg) scale(1.1);
                opacity: 0.8;
            }
            100% {
                transform: rotate(360deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes spin-ring-2 {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }
            50% {
                transform: rotate(-180deg) scale(1.15);
                opacity: 0.7;
            }
            100% {
                transform: rotate(-360deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes spin-ring-3 {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }
            50% {
                transform: rotate(180deg) scale(1.2);
                opacity: 0.6;
            }
            100% {
                transform: rotate(360deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse-center {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            }
            50% {
                transform: scale(1.2);
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            }
        }

        /* Loading Text */
        .modern-loading-text {
            text-align: center;
            color: white;
        }

        .modern-loading-text h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 15px 0;
            animation: fade-in-up 0.6s ease-out;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: bounce-dot 1.4s infinite ease-in-out;
        }

        .dot-1 {
            animation-delay: 0s;
        }

        .dot-2 {
            animation-delay: 0.2s;
        }

        .dot-3 {
            animation-delay: 0.4s;
        }

        @keyframes bounce-dot {
            0%, 80%, 100% {
                transform: scale(0.8) translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2) translateY(-10px);
                opacity: 1;
            }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Demo Controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .demo-controls button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #dc2626;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .demo-controls button:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .demo-info {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 300px;
        }

        .demo-info h3 {
            margin: 0 0 10px 0;
            color: #dc2626;
        }

        .demo-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .modern-spinner {
                width: 100px;
                height: 100px;
            }
            
            .ring-1 {
                width: 100px;
                height: 100px;
            }
            
            .ring-2 {
                width: 75px;
                height: 75px;
            }
            
            .ring-3 {
                width: 50px;
                height: 50px;
            }
            
            .spinner-center {
                width: 25px;
                height: 25px;
            }
            
            .modern-loading-text h2 {
                font-size: 1.2rem;
                padding: 0 20px;
            }

            .demo-info {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }

            .demo-controls {
                bottom: 10px;
                right: 10px;
                left: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="demo-info">
        <h3>🎨 Modern Loading Preview</h3>
        <p><strong>Features:</strong></p>
        <ul style="padding-left: 20px; margin: 10px 0;">
            <li>Multi-ring animation</li>
            <li>Color gradients</li>
            <li>Pulsing center</li>
            <li>Bouncing dots</li>
            <li>Fully responsive</li>
        </ul>
        <p><strong>Current View:</strong> <span id="current-view">Fullscreen</span></p>
    </div>

    <div class="demo-controls">
        <div><strong>Loading Screen Demos</strong></div>
        <button onclick="showLoading('Initializing application...')">App Init</button>
        <button onclick="showLoading('Loading your dashboard...')">Student Dashboard</button>
        <button onclick="showLoading('Loading Admin Dashboard...')">Admin Dashboard</button>
        <button onclick="showLoading('Loading AI System Dashboard...')">AI Dashboard</button>
    </div>

    <div id="loading-container"></div>

    <script>
        function showLoading(text) {
            document.getElementById('current-view').textContent = text;
            const container = document.getElementById('loading-container');
            container.innerHTML = `
                <div class="modern-loading-container fullscreen">
                    <div class="modern-loading-content">
                        <div class="modern-spinner">
                            <div class="spinner-ring ring-1"></div>
                            <div class="spinner-ring ring-2"></div>
                            <div class="spinner-ring ring-3"></div>
                            <div class="spinner-center"></div>
                        </div>
                        <div class="modern-loading-text">
                            <h2>${text}</h2>
                            <div class="loading-dots">
                                <span class="dot dot-1"></span>
                                <span class="dot dot-2"></span>
                                <span class="dot dot-3"></span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show initial loading screen
        showLoading('Initializing application...');
    </script>
</body>
</html>
